<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .bhargav {
        background-color: blueviolet;
        border: 10px solid black;
        height: 300px;
        width: 300px;
      }
      .bhargav:hover {
        background-color: yellowgreen;
        border-radius: 100%;
        transition-duration: 7s;
        transform: skew(360deg);
      }
    </style>
  </head>
  <body>
    <div class="bhargav"></div>
  </body>
</html>
