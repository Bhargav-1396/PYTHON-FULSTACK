<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .parent {
        width: 400px;
        height: 300px;
        background-color: aqua;
        border: 6px solid papayawhip;
        display: grid;
        padding: 5px;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }
      .parent > div {
        background-color: blueviolet;
        color: white;
        font-size: 90px;
        text-align: center;
      }
      .parent > .child2,
      .child4,
      .child5 {
        grid-row: span 2;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1">1</div>
      <div class="child2">2</div>
      <div class="child3">3</div>
      <div class="child4">4</div>
      <div class="child5">5</div>
      <div class="child6">6</div>
    </div>
  </body>
</html>
