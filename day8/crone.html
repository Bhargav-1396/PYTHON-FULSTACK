<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      ol {
        display: flex;
        width: 700px;
        justify-content: space-around;
        align-items: center;
      }
      ol > li {
        display: flex;
      }
      ol > li:hover {
        color: red;
      }
      span {
        background-color: white;
        color: blue;
      }
      .right {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 200px;
        padding: 5%;
      }
      button {
        background-color: blue;
        color: azure;
        width: 100px;
        border-radius: 10%;
      }
      h2 {
        background-color: red;
        width: 35px;
        height: 35px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div class="nav">
      <div class="left">
        <ol Id="quicklinks">
          <li>
            <h1><span>Digit</span>Marketing</h1>
          </li>
          <li>Home</li>
          <li>About</li>
          <li>Services</li>
          <li>Pages
            <ol>
                <li>Blog Page</li>
                <li></li>
                <li></li>
                <li></li>
            </ol>
          </li>
          <li>Contact</li>
        </ol>
      </div>
      <div class="right">
        <h2>🔍︎</h2>
        <button>Purchase</button>
      </div>
    </div>
  </body>
</html>
