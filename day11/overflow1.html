<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .parent {
        width: 200px;
        height: 100px;
        border: 5px solid black;

        background-color: aquamarine;
      }
      .parent > div {
        width: 200px;
        height: 100px;
        border: 5px solid brown;
        background-color: blue;
        padding: 10px;
        box-sizing: border-box;
      }
      h1 {
        padding: 10px;
        border: 10px solid black;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1"></div>
      <h1>Bhargav</h1>
    </div>
  </body>
</html>
