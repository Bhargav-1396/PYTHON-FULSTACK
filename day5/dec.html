<html>
  <head>
    <title>selectors</title>
    <style>
      h1 ~ p {
        color: aqua;
      }
      h1 + p {
        color: blue;
      }
      #p2 {
        color: antiquewhite;
      }
      #p3 {
        color: blueviolet;
      }
    </style>
  </head>
  <body>
    <h1>Bhargav</h1>
    <p>sunil</p>
    <p id="p2">viswa</p>
    <p id="p3">hemanth</p>
    <p>paven</p>
  </body>
</html>
