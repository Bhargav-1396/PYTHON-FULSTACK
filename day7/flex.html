<!doctype html>
<html lang="en">
  <head>
    <title>semantic</title>
    <style>
      * {
        margin: 0px;
      }
      header {
        width: 1500px;
        height: 200px;
        background-color: blanchedalmond;
      }
      nav {
        width: 1500px;
        height: 100px;
        background-color: aqua;
      }
      main {
        display: flex;
      }
      div > section {
        width: 1000px;
        height: 200px;
        background-color: blueviolet;
      }
      div > article {
        width: 1000px;
        height: 300px;
        background-color: brown;
      }
      div > aside {
        width: 500px;
        height: 500px;
        background-color: aquamarine;
      }
      footer {
        width: 1500px;
        background-color: chartreuse;
      }
      header,
      nav,
      section,
      article,
      aside,
      footer {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 50px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <header><h1>header</h1></header>
    <nav><h1>nav</h1></nav>
    <main>
      <div class="child1">
        <section><h1>section</h1></section>
        <article><h1>article</h1></article>
      </div>
      <div class="child2">
        <aside><h1>aside</h1></aside>
      </div>
    </main>
    <footer><h1>footer</h1></footer>
  </body>
</html>
