<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      div {
        font-size: 100px;
        height: 150px;
        width: 150px;
      }
      .parent {
        background-color: black;
        width: 500px;
        height: 500px;
        display: flex;
        flex-direction: row;
        justify-content: start;
      }

      .child1 {
        background-color: red;
        order: 0;
      }
      .child2 {
        background-color: antiquewhite;
        order: 2;
      }
      .child3 {
        background-color: goldenrod;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1">1</div>
      <div class="child2">2</div>
      <div class="child3">3</div>
    </div>
  </body>
</html>
