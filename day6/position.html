<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .parent {
        width: 500px;
        height: 400px;
        border: 7px solid greenyellow;
        background-color: antiquewhite;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .child {
        width: 40%;
        height: 50%;
        border-radius: 90%;
        border: 3px solid white;
        background-color: black;
      }
      .c1 {
        width: 30%;
        height: 40%;
        border-radius: 80%;
        border: 3px solid green;
        background-color: yellowgreen;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child"></div>
      <div class="c1"></div>
    </div>
  </body>
</html>
