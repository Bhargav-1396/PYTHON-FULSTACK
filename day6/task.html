<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .parent {
        width: 500px;
        height: 400px;
        border: 7px solid greenyellow;
        background-color: antiquewhite;
        position: relative;
      }
      .child {
        width: 40%;
        height: 50%;
        border: 3px solid yellowgreen;
        background-color: black;
        position: absolute;
        right: 4px;
        bottom: 0px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
    <div class="child"></div>
    
  </body>
</html>
