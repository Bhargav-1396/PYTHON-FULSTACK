<!doctype html>
<html lang="en">
  <head>
    <title>border</title>
    <style>
      h1 {
        border: 5px ;
        border-color: blueviolet;
        border-style: solid
        display: inline;
      }
      #dashed {
        border: 5px dotted palevioletred;
      }
    </style>
  </head>
  <body>
    <h1>BHARGAV</h1>
    <h1 id="dashed">DASHED</h1>
  </body>
</html>
