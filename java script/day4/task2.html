<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input id="abc" type="text" placeholder="Enter your Name: " /> <br />
    <button onclick="show()">view</button>
    <h1 id="result">Result</h1>
    <script>
      function show() {
        let name = document.getElementById("abc").value;
        let res = "My name is " + name;
        document.getElementById("result").innerText = res;
      }
    </script>
  </body>
</html>
