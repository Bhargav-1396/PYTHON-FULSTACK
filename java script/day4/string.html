<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
  </head>
  <body>
    <button onclick="changeBGred()">red</button>
    <button onclick="changeBGyellow()">yellow</button>
    <button onclick="changeBGgreen()">green</button>
    <button onclick="changeBGorange()">orange</button>
    <button onclick="changeBGblue()">Click Me</button>

    <script>
      function changeBGred() {
        document.body.style = "background-color: red";
      }
      function changeBGyellow() {
        document.body.style = "background-color: yellow";
      }
      function changeBGgreen() {
        document.body.style = "background-color: green";
      }
      function changeBGorange() {
        document.body.style = "background-color: orange";
      }
      function changeBGblue() {
        document.body.style = "background-color: blue";
      }
    </script>
  </body>
</html>
