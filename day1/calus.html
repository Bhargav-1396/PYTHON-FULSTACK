<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f3f7;
        }

        .calculator {
            background-color: #1e222b;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            width: 320px;
        .display {
            width: 100%;
            height: 70px;
            background-color: #2b303c;
            border: none;
            outline: none;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 2rem;
            text-align: right;
            padding: 0 15px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 18px;
            border: none;
            outline: none;
            border-radius: 50%;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #3a4150;
            color: #ffffff;
        }

        button:active {
            transform: scale(0.95);
        }

        .operator {
            background-color: #ff9f0a;
            color: #ffffff;
        }

        .operator:hover {
            background-color: #e08b07;
        }

        .utility {
            background-color: #a5a5a5;
            color: #000000;
        }

        .utility:hover {
            background-color: #cdcdcd;
        }

        .equal {
            background-color: goldenrod;
            color: gray;
            grid-column: span 2;
            border-radius: 30px;
        }

        button:hover:not(.operator):not(.utility) {
            background-color: gray;
        }
    </style>

</head>
<body>
        <div class="calculator">
        <input type="text" class="display" id="screen" readonly value="">
        
        <div class="buttons">
            <button class="utility" onclick="clearScreen()">AC</button>
            <button class="utility" onclick="deleteLast()">DEL</button>
            <button class="operator" onclick="appendValue('%')">%</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">*</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">-</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculateResult()">=</button>
        </div>
    </div>

  
</body>
</html>
